<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVC Card Maker - Aadhar & Signature</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&family=Sacramento&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: sans-serif; background-color: #fdf2f8; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 450px; }
        
        /* PVC കാർഡ് സൈസ് (85.6mm x 54mm) */
        .pvc-card {
            width: 324px; height: 204px;
            border: 1px solid #ddd; border-radius: 12px;
            margin: 15px auto; position: relative;
            overflow: hidden; background: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .pvc-card img { position: absolute; cursor: move; width: 100%; top: 0; left: 0; }

        .sig-text { position: absolute; bottom: 20px; width: 100%; text-align: center; font-size: 24px; color: #333; pointer-events: none; }
        
        .upload-btn { background: #f472b6; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; display: inline-block; margin: 5px; font-size: 14px; }
        input[type="file"], .name-input { display: none; }
        
        .controls { margin-bottom: 15px; }
        .name-box { width: 90%; padding: 10px; border: 2px solid #f472b6; border-radius: 8px; margin-bottom: 10px; outline: none; }
        
        .print-btn { background: #db2777; color: white; padding: 12px; border: none; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        
        /* സിഗ്നേച്ചർ സ്റ്റൈലുകൾ */
        .font1 { font-family: 'Dancing Script', cursive; }
        .font2 { font-family: 'Great Vibes', cursive; }
        .font3 { font-family: 'Sacramento', cursive; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #db2777;">PVC Card Maker</h2>
    
    <div class="controls">
        <input type="text" id="userName" class="name-box" placeholder="സിഗ്നേച്ചറിനായി പേര് നൽകൂ..." oninput="updateSig()">
        <br>
        <label for="frontInp" class="upload-btn">Front Photo</label>
        <input type="file" id="frontInp" accept="image/*" onchange="loadImg(event, 'frontImg')">
        
        <label for="backInp" class="upload-btn">Back Photo</label>
        <input type="file" id="backInp" accept="image/*" onchange="loadImg(event, 'backImg')">
    </div>

    <p style="font-size: 12px; font-weight: bold;">FRONT SIDE</p>
    <div class="pvc-card" id="frontCard">
        <img id="frontImg" src="" alt="">
        <div id="sigFront" class="sig-text font1"></div>
    </div>

    <p style="font-size: 12px; font-weight: bold;">BACK SIDE</p>
    <div class="pvc-card" id="backCard">
        <img id="backImg" src="" alt="">
    </div>

    <button class="print-btn" onclick="window.print()">Print PVC Now</button>
    <br><br>
    <a href="index.html" style="text-decoration:none; color:#666;">← Back to Home</a>
</div>

<script>
    // ഫോട്ടോ ലോഡ് ചെയ്യാൻ
    function loadImg(event, imgId) {
        const reader = new FileReader();
        reader.onload = function() {
            const output = document.getElementById(imgId);
            output.src = reader.result;
        };
        reader.readAsDataURL(event.target.files[0]);
    }

    // സിഗ്നേച്ചർ അപ്‌ഡേറ്റ് ചെയ്യാൻ
    function updateSig() {
        const name = document.getElementById('userName').value;
        document.getElementById('sigFront').innerText = name;
    }

    // ഫോട്ടോ ഡ്രാഗ് (Drag) ചെയ്യാൻ
    function setupDrag(imgId) {
        const img = document.getElementById(imgId);
        let isDragging = false;
        let startX, startY, initialLeft, initialTop;

        img.onmousedown = function(e) {
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            initialLeft = img.offsetLeft;
            initialTop = img.offsetTop;
            return false;
        };

        window.onmousemove = function(e) {
            if (isDragging) {
                img.style.left = (initialLeft + (e.clientX - startX)) + "px";
                img.style.top = (initialTop + (e.clientY - startY)) + "px";
            }
        };

        window.onmouseup = function() { isDragging = false; };
    }

    setupDrag('frontImg');
    setupDrag('backImg');
</script>

</body>
</html>

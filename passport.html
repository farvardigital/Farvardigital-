<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <title>Passport Photo Maker</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        #canvas { border: 2px solid #333; margin-top: 20px; display: none; max-width: 100%; }
        .preview-img { width: 140px; height: 180px; object-fit: cover; border: 2px solid #ddd; margin: 10px auto; display: block; }
        input[type="file"] { margin: 20px 0; }
        .btn { padding: 10px 20px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <h2>Passport Photo Maker</h2>
    <p>ഫോട്ടോ അപ്‌ലോഡ് ചെയ്യുക</p>
    
    <input type="file" id="upload" accept="image/*">
    <br>
    
    <canvas id="canvas"></canvas>
    <img id="preview" class="preview-img" style="display:none;">
    <br>
    
    <a id="downloadBtn" class="btn" style="display:none;">ഫോട്ടോ ഡൗൺലോഡ് ചെയ്യുക</a>
</div>

<script>
    const upload = document.getElementById('upload');
    const canvas = document.getElementById('canvas');
    const preview = document.getElementById('preview');
    const downloadBtn = document.getElementById('downloadBtn');
    const ctx = canvas.getContext('2d');

    upload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();

        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                // പാസ്‌പോർട്ട് സൈസ് അനുപാതം (3.5 : 4.5)
                const width = 350;
                const height = 450;
                
                canvas.width = width;
                canvas.height = height;

                // ഫോട്ടോ ക്യാൻവാസിലേക്ക് വരയ്ക്കുന്നു (ക്രോപ്പ് ചെയ്ത് സെന്റർ ആക്കുന്നു)
                let sourceX, sourceY, sourceWidth, sourceHeight;
                const imgRatio = img.width / img.height;
                const targetRatio = width / height;

                if (imgRatio > targetRatio) {
                    sourceHeight = img.height;
                    sourceWidth = img.height * targetRatio;
                    sourceX = (img.width - sourceWidth) / 2;
                    sourceY = 0;
                } else {
                    sourceWidth = img.width;
                    sourceHeight = img.width / targetRatio;
                    sourceY = (img.height - sourceHeight) / 2;
                    sourceX = 0;
                }

                ctx.drawImage(img, sourceX, sourceY, sourceWidth, sourceHeight, 0, 0, width, height);

                // പ്രിവ്യൂ കാണിക്കുന്നു
                preview.src = canvas.toDataURL('image/jpeg');
                preview.style.display = 'block';
                
                // ഡൗൺലോഡ് ലിങ്ക് സെറ്റ് ചെയ്യുന്നു
                downloadBtn.href = canvas.toDataURL('image/jpeg');
                downloadBtn.download = 'passport_photo.jpg';
                downloadBtn.style.display = 'inline-block';
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });
</script>

</body>
</html>

<div class="container">
    <h2>Passport Photo Maker</h2>
    <p>ഫോട്ടോ അപ്‌ലോഡ് ചെയ്യുക</p>
    
    <input type="file" id="upload" accept="image/*">
    <br>

    <div style="margin: 15px 0;">
        <label>ബാക്ക്ഗ്രൗണ്ട് നിറം: </label>
        <select id="bgColor">
            <option value="white">വെളുപ്പ് (White)</option>
            <option value="#3b82f6">നീല (Blue)</option>
            <option value="#ef4444">ചുവപ്പ് (Red)</option>
            <option value="none">മാറ്റമില്ലാതെ</option>
        </select>
    </div>
    
    <canvas id="canvas" style="display:none;"></canvas>
    <img id="preview" class="preview-img" style="display:none; border: 5px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.2);">
    <br>
    
    <a id="downloadBtn" class="btn" style="display:none;">ഫോട്ടോ ഡൗൺലോഡ് ചെയ്യുക</a>
</div>

<script>
    const upload = document.getElementById('upload');
    const bgColorSelect = document.getElementById('bgColor');
    const canvas = document.getElementById('canvas');
    const preview = document.getElementById('preview');
    const downloadBtn = document.getElementById('downloadBtn');
    const ctx = canvas.getContext('2d');

    let currentImg = null;

    upload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                currentImg = img;
                processPhoto();
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    // നിറം മാറ്റുമ്പോൾ ഫോട്ടോ അപ്ഡേറ്റ് ചെയ്യാൻ
    bgColorSelect.addEventListener('change', processPhoto);

    function processPhoto() {
        if (!currentImg) return;

        const width = 350;
        const height = 450;
        canvas.width = width;
        canvas.height = height;

        // 1. ആദ്യം തിരഞ്ഞെടുത്ത ബാക്ക്ഗ്രൗണ്ട് നിറം നൽകുന്നു
        const selectedColor = bgColorSelect.value;
        if (selectedColor !== "none") {
            ctx.fillStyle = selectedColor;
            ctx.fillRect(0, 0, width, height);
        }

        // 2. ഫോട്ടോ ക്രോപ്പ് ചെയ്ത് വരയ്ക്കുന്നു
        let sourceX, sourceY, sourceWidth, sourceHeight;
        const imgRatio = currentImg.width / currentImg.height;
        const targetRatio = width / height;

        if (imgRatio > targetRatio) {
            sourceHeight = currentImg.height;
            sourceWidth = currentImg.height * targetRatio;
            sourceX = (currentImg.width - sourceWidth) / 2;
            sourceY = 0;
        } else {
            sourceWidth = currentImg.width;
            sourceHeight = currentImg.width / targetRatio;
            sourceY = (currentImg.height - sourceHeight) / 2;
            sourceX = 0;
        }

        ctx.drawImage(currentImg, sourceX, sourceY, sourceWidth, sourceHeight, 0, 0, width, height);

        // പ്രിവ്യൂ കാണിക്കുന്നു
        preview.src = canvas.toDataURL('image/jpeg');
        preview.style.display = 'block';
        
        // ഡൗൺലോഡ് ലിങ്ക്
        downloadBtn.href = canvas.toDataURL('image/jpeg');
        downloadBtn.download = 'passport_photo.jpg';
        downloadBtn.style.display = 'inline-block';
    }
</script>
